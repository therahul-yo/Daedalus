name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  test:
    name: Test Suite
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      # Actions pinned to commit SHAs: mutable tags are a supply-chain risk.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - run: uv sync --extra dev --locked
      - run: uv run ruff check .
      - name: Run test suite
        run: uv run --extra dev pytest -q --timeout=120
      - run: uv build

  smoke:
    name: Smoke Benchmark
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - run: uv sync --extra dev --locked
      - name: Run smoke benchmark
        run: |
          mkdir -p bench/results
          uv run bench/smoke.py mlx-community/Qwen3-0.6B-4bit --out bench/results/smoke.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: smoke-benchmark
          path: bench/results/smoke.json
        timeout-minutes: 30

  # Thermal validation runs real Metal inference and requires Apple Silicon
  # hardware with sustained GPU capability. Hosted macOS runners cannot
  # complete these jobs — they fail with Metal command-buffer errors under
  # sustained load. Run manually on a physical machine when needed.
  thermal:
    if: github.event_name == 'workflow_dispatch'
    name: Thermal Validation (Governor On/Off)
    runs-on: [self-hosted, macos, arm64]
    timeout-minutes: 120
    strategy:
      matrix:
        governor: ["on", "off"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - run: uv sync --extra dev --locked
      - name: Run thermal validation (governor ${{ matrix.governor }})
        run: |
          mkdir -p bench/results
          uv run bench/thermal_validation.py \
            --model mlx-community/Qwen3-0.6B-4bit \
            --prompt-tokens 24000 \
            --rounds 4 \
            --governor ${{ matrix.governor }} \
            --out bench/results/thermal_${{ matrix.governor }}.json
        timeout-minutes: 45

  regression:
    name: Regression Gate
    runs-on: macos-14
    needs: [smoke]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - run: uv sync --extra dev --locked
      - name: Run regression gate
        run: |
          # A regression pair is same-config baseline vs candidate. The two
          # committed thermal artifacts are a governor A/B pair — NOT a
          # regression pair — so the fingerprint gate rightly refuses them
          # (exit 2 = incomparable, treated as skip). Exit 1 = regression.
          BASELINE=$(find bench/results -name "smoke_baseline*.json" | head -1)
          CANDIDATE=$(find bench/results -name "smoke*.json" ! -name "smoke_baseline*" | head -1)
          if [ -z "$BASELINE" ] || [ -z "$CANDIDATE" ]; then
            echo "Skipping regression gate - no committed baseline to compare against"
            echo "Baseline: $BASELINE  Candidate: $CANDIDATE"
            exit 0
          fi
          echo "Running regression gate: baseline=$BASELINE candidate=$CANDIDATE"
          set +e
          uv run bench/regression.py "$BASELINE" "$CANDIDATE" \
            --max-ttft-regression 0.10 \
            --max-throughput-regression 0.10
          rc=$?
          set -e
          if [ "$rc" = "2" ]; then
            echo "Artifacts not comparable (config fingerprint mismatch) - skipping"
            exit 0
          fi
          exit "$rc"
        timeout-minutes: 10
