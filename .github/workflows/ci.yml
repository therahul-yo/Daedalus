name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  test:
    name: Test Suite
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      # Actions pinned to commit SHAs: mutable tags are a supply-chain risk.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - run: uv sync --extra dev --locked
      - name: Run test suite
        run: uv run --extra dev pytest -q --timeout=120

  smoke:
    name: Smoke Benchmark
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - run: uv sync --extra dev --locked
      - name: Run smoke benchmark
        run: |
          mkdir -p bench/results
          uv run bench/smoke.py mlx-community/Qwen3-0.6B-4bit
        timeout-minutes: 30

  # Thermal validation runs real Metal inference and requires Apple Silicon
  # hardware with sustained GPU capability. Hosted macOS runners cannot
  # complete these jobs — they fail with Metal command-buffer errors under
  # sustained load. Run manually on a physical machine when needed.
  thermal:
    if: github.event_name == 'workflow_dispatch'
    name: Thermal Validation (Governor On/Off)
    runs-on: [self-hosted, macos, arm64]
    timeout-minutes: 120
    strategy:
      matrix:
        governor: ["on", "off"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - run: uv sync --extra dev --locked
      - name: Run thermal validation (governor ${{ matrix.governor }})
        run: |
          mkdir -p bench/results
          uv run bench/thermal_validation.py \
            --model mlx-community/Qwen3-0.6B-4bit \
            --prompt-tokens 24000 \
            --rounds 4 \
            --governor ${{ matrix.governor }} \
            --out bench/results/thermal_${{ matrix.governor }}.json
        timeout-minutes: 45

  regression:
    name: Regression Gate
    runs-on: macos-14
    needs: [smoke]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - run: uv sync --extra dev --locked
      - name: Run regression gate
        run: |
          # Find baseline and candidate artifacts
          BASELINE=$(find bench/results -name "thermal_on.json" -o -name "smoke*.json" | head -1)
          CANDIDATE=$(find bench/results -name "thermal_off.json" -o -name "smoke*.json" | tail -1)
          if [ -n "$BASELINE" ] && [ -n "$CANDIDATE" ] && [ "$BASELINE" != "$CANDIDATE" ]; then
            echo "Running regression gate: baseline=$BASELINE candidate=$CANDIDATE"
            uv run bench/regression.py "$BASELINE" "$CANDIDATE" \
              --max-ttft-regression 0.10 \
              --max-throughput-regression 0.10
          else
            echo "Skipping regression gate - need baseline and candidate artifacts"
            echo "Baseline: $BASELINE"
            echo "Candidate: $CANDIDATE"
          fi
        timeout-minutes: 10
