name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    # Apple Silicon runner — mlx requires arm64 macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Test
        run: python -m pytest tests/ -q --tb=short
