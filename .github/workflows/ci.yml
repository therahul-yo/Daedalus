name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  # Manual trigger so the self-hosted thermal job (guarded on this event) is
  # actually reachable. Regular jobs stay on push/PR; thermal only runs here.
  workflow_dispatch:

jobs:
  test:
    name: Test Suite
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      # Actions pinned to commit SHAs: mutable tags are a supply-chain risk.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - run: uv sync --extra dev --locked
      - run: uv run ruff check .
      - name: Run test suite
        # Coverage floor is measured-minus-margin (local total 73%), so it gates
        # regressions in coverage without blocking unrelated PRs.
        run: uv run --extra dev pytest -q --timeout=120 --cov=daedalus --cov-fail-under=71
      - run: uv build

  smoke:
    name: Smoke Benchmark
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - run: uv sync --extra dev --locked
      - name: Run smoke benchmark
        run: |
          mkdir -p bench/results
          uv run bench/smoke.py mlx-community/Qwen3-0.6B-4bit
        timeout-minutes: 30
      # Hand the fingerprinted result to the regression gate (same run) and make
      # it the baseline that future default-branch runs download and compare to.
      - name: Upload smoke result
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: smoke-benchmark
          path: bench/results/smoke.json
          if-no-files-found: error

  # Thermal validation runs real Metal inference and requires Apple Silicon
  # hardware with sustained GPU capability. Hosted macOS runners cannot
  # complete these jobs — they fail with Metal command-buffer errors under
  # sustained load. Run manually on a physical machine when needed.
  thermal:
    if: github.event_name == 'workflow_dispatch'
    name: Thermal Validation (Governor On/Off)
    runs-on: [self-hosted, macos, arm64]
    timeout-minutes: 120
    strategy:
      matrix:
        governor: ["on", "off"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - run: uv sync --extra dev --locked
      - name: Run thermal validation (governor ${{ matrix.governor }})
        run: |
          mkdir -p bench/results
          uv run bench/thermal_validation.py \
            --model mlx-community/Qwen3-0.6B-4bit \
            --prompt-tokens 24000 \
            --rounds 4 \
            --governor ${{ matrix.governor }} \
            --out bench/results/thermal_${{ matrix.governor }}.json
        timeout-minutes: 45

  regression:
    name: Regression Gate
    runs-on: macos-14
    needs: [smoke]
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read  # read past runs' artifacts to fetch a baseline
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - run: uv sync --extra dev --locked
      # Candidate: the fingerprinted smoke result produced by this run's smoke job.
      - name: Download candidate smoke result
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: smoke-benchmark
          path: bench/candidate
      # Baseline: newest smoke result from the latest successful push run of this
      # workflow on the default branch. Fetched with gh api so there is no extra
      # third-party action to pin; missing/failed lookups leave bench/baseline
      # empty and the compare step reports an honest SKIP.
      - name: Download baseline smoke result
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          mkdir -p bench/baseline
          BRANCH=$(gh api "repos/$REPO" --jq '.default_branch' 2>/dev/null || echo "")
          [ -z "$BRANCH" ] && BRANCH=master
          RUN_ID=$(gh api \
            "repos/$REPO/actions/workflows/ci.yml/runs?branch=$BRANCH&status=success&event=push&per_page=1" \
            --jq '.workflow_runs[0].id // empty' 2>/dev/null || echo "")
          if [ -z "$RUN_ID" ]; then
            echo "no successful $BRANCH run to source a baseline from"
            exit 0
          fi
          ART_ID=$(gh api "repos/$REPO/actions/runs/$RUN_ID/artifacts" \
            --jq '[.artifacts[] | select(.name=="smoke-benchmark")][0].id // empty' \
            2>/dev/null || echo "")
          if [ -z "$ART_ID" ]; then
            echo "run $RUN_ID has no smoke-benchmark artifact"
            exit 0
          fi
          if gh api "repos/$REPO/actions/artifacts/$ART_ID/zip" > bench/baseline/baseline.zip 2>/dev/null; then
            unzip -o bench/baseline/baseline.zip -d bench/baseline >/dev/null
            echo "downloaded baseline from run $RUN_ID"
          else
            echo "baseline artifact download failed"
          fi
      - name: Compare against baseline
        run: |
          set -uo pipefail
          CANDIDATE=$(find bench/candidate -name '*.json' | head -1)
          BASELINE=$(find bench/baseline -name '*.json' 2>/dev/null | head -1)
          if [ -z "$BASELINE" ]; then
            echo "::notice::perf regression gate SKIPPED — no comparable baseline"
            echo "### Perf regression gate: SKIPPED — no baseline artifact" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "comparing baseline=$BASELINE candidate=$CANDIDATE"
          set +e
          uv run bench/regression.py "$BASELINE" "$CANDIDATE" \
            --max-ttft-regression 0.25 \
            --max-throughput-regression 0.25
          rc=$?
          set -e
          # Exit 2 = fingerprint mismatch (different runner image / lib versions):
          # not a real comparison, so report it as a visible skip, never a pass.
          if [ "$rc" = "2" ]; then
            echo "::notice::perf regression gate SKIPPED — no comparable baseline"
            echo "### Perf regression gate: SKIPPED — baseline fingerprint mismatch" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # Exit 1 = regression. Hosted-runner variance makes a hard fail
          # unreliable, so surface it loudly as a warning instead of blocking.
          if [ "$rc" != "0" ]; then
            echo "::warning::perf regression detected vs baseline (not failing: hosted-runner variance)"
            echo "### Perf regression gate: WARNING — regression detected vs baseline" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "### Perf regression gate: PASSED — compared against default-branch baseline" >> "$GITHUB_STEP_SUMMARY"
        timeout-minutes: 10
