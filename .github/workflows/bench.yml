name: Scheduled Benchmarks

on:
  schedule:
    - cron: '0 3 * * *'  # Daily at 3 AM UTC
  workflow_dispatch:
    inputs:
      model:
        description: 'Model to benchmark'
        required: false
        default: 'mlx-community/Qwen3-0.6B-4bit'
      prompt_tokens:
        description: 'Prompt tokens for thermal validation'
        required: false
        default: '24000'
      rounds:
        description: 'Number of thermal validation rounds'
        required: false
        default: '4'

jobs:
  bench:
    name: Full Benchmark Suite
    runs-on: macos-14
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
      # Actions pinned to commit SHAs: mutable tags are a supply-chain risk.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - run: uv sync --extra dev --locked

      - name: Run smoke benchmark
        id: smoke
        run: |
          MODEL="${{ github.event.inputs.model || 'mlx-community/Qwen3-0.6B-4bit' }}"
          echo "Running smoke benchmark with model: $MODEL"
          mkdir -p bench/results
          uv run bench/smoke.py "$MODEL" 4000
        timeout-minutes: 30

      - name: Run thermal validation (governor ON)
        id: thermal_on
        run: |
          MODEL="${{ github.event.inputs.model || 'mlx-community/Qwen3-0.6B-4bit' }}"
          PROMPT_TOKENS="${{ github.event.inputs.prompt_tokens || '24000' }}"
          ROUNDS="${{ github.event.inputs.rounds || '4' }}"
          echo "Running thermal validation (governor ON) with model: $MODEL, prompt_tokens: $PROMPT_TOKENS, rounds: $ROUNDS"
          mkdir -p bench/results
          uv run bench/thermal_validation.py \
            --model "$MODEL" \
            --prompt-tokens "$PROMPT_TOKENS" \
            --rounds "$ROUNDS" \
            --governor on \
            --out bench/results/thermal_on.json
        timeout-minutes: 60

      - name: Cool down period
        run: |
          echo "Cooling down for 5 minutes..."
          sleep 300

      - name: Run thermal validation (governor OFF)
        id: thermal_off
        run: |
          MODEL="${{ github.event.inputs.model || 'mlx-community/Qwen3-0.6B-4bit' }}"
          PROMPT_TOKENS="${{ github.event.inputs.prompt_tokens || '24000' }}"
          ROUNDS="${{ github.event.inputs.rounds || '4' }}"
          echo "Running thermal validation (governor OFF) with model: $MODEL, prompt_tokens: $PROMPT_TOKENS, rounds: $ROUNDS"
          mkdir -p bench/results
          uv run bench/thermal_validation.py \
            --model "$MODEL" \
            --prompt-tokens "$PROMPT_TOKENS" \
            --rounds "$ROUNDS" \
            --governor off \
            --out bench/results/thermal_off.json
        timeout-minutes: 60

      - name: Run regression gate
        id: regression
        run: |
          echo "Running regression gate on benchmark artifacts..."
          if [ -f bench/results/thermal_on.json ] && [ -f bench/results/thermal_off.json ]; then
            echo "Running regression: baseline=thermal_on.json candidate=thermal_off.json"
            uv run bench/regression.py \
              bench/results/thermal_on.json \
              bench/results/thermal_off.json \
              --max-ttft-regression 0.10 \
              --max-throughput-regression 0.10
          else
            echo "Skipping regression gate - missing benchmark artifacts"
            exit 0
          fi
        timeout-minutes: 10

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: bench/results/
          retention-days: 30

      - name: Create benchmark summary
        if: always()
        run: |
          echo "## Benchmark Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Governor ON | Governor OFF |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------------|--------------|" >> $GITHUB_STEP_SUMMARY
          
          if [ -f bench/results/thermal_on.json ]; then
            ON_WALL=$(python3 -c "import json; print(json.load(open('bench/results/thermal_on.json'))['rounds'][0].get('wall_s', json.load(open('bench/results/thermal_on.json'))['rounds'][0].get('wall_time', '?')))")
            ON_TPS=$(python3 -c "import json; print(json.load(open('bench/results/thermal_on.json'))['rounds'][0].get('tps_wall', json.load(open('bench/results/thermal_on.json'))['rounds'][0].get('prefill_tps', '?')))")
            echo "| Wall Time (round 1) | ${ON_WALL}s | - |" >> $GITHUB_STEP_SUMMARY
            echo "| Tok/s (round 1) | ${ON_TPS} | - |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f bench/results/thermal_off.json ]; then
            OFF_WALL=$(python3 -c "import json; print(json.load(open('bench/results/thermal_off.json'))['rounds'][0].get('wall_s', json.load(open('bench/results/thermal_off.json'))['rounds'][0].get('wall_time', '?')))")
            OFF_TPS=$(python3 -c "import json; print(json.load(open('bench/results/thermal_off.json'))['rounds'][0].get('tps_wall', json.load(open('bench/results/thermal_off.json'))['rounds'][0].get('prefill_tps', '?')))")
            echo "| Wall Time (round 1) | - | ${OFF_WALL}s |" >> $GITHUB_STEP_SUMMARY
            echo "| Tok/s (round 1) | - | ${OFF_TPS} |" >> $GITHUB_STEP_SUMMARY
          fi
