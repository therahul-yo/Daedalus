name: Scheduled Benchmarks

on:
  schedule:
    - cron: '0 3 * * *'  # Daily at 3 AM UTC
  workflow_dispatch:
    inputs:
      model:
        description: 'Model to benchmark'
        required: false
        default: 'mlx-community/Qwen3-0.6B-4bit'
      prompt_tokens:
        description: 'Prompt tokens for thermal validation'
        required: false
        default: '24000'
      rounds:
        description: 'Number of thermal validation rounds'
        required: false
        default: '4'

jobs:
  bench:
    name: Full Benchmark Suite
    runs-on: macos-14
    timeout-minutes: 120
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Cache MLX and HuggingFace caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mlx
            ~/.cache/huggingface
            ~/.cache/huggingface_hub
          key: ${{ runner.os }}-mlx-hf-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-mlx-hf-

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run smoke benchmark
        id: smoke
        run: |
          MODEL="${{ github.event.inputs.model || 'mlx-community/Qwen3-0.6B-4bit' }}"
          echo "Running smoke benchmark with model: $MODEL"
          mkdir -p bench/results
          python bench/smoke.py --model "$MODEL" --prompt-tokens 4000
          # Smoke script prints "SMOKE PASSED" on success
        timeout-minutes: 30

      - name: Run thermal validation (governor ON)
        id: thermal_on
        run: |
          MODEL="${{ github.event.inputs.model || 'mlx-community/Qwen3-0.6B-4bit' }}"
          PROMPT_TOKENS="${{ github.event.inputs.prompt_tokens || '24000' }}"
          ROUNDS="${{ github.event.inputs.rounds || '4' }}"
          echo "Running thermal validation (governor ON) with model: $MODEL, prompt_tokens: $PROMPT_TOKENS, rounds: $ROUNDS"
          mkdir -p bench/results
          python bench/thermal_validation.py \
            --model "$MODEL" \
            --prompt-tokens "$PROMPT_TOKENS" \
            --rounds "$ROUNDS" \
            --governor on \
            --out bench/results/thermal_on.json
        timeout-minutes: 60

      - name: Cool down period
        run: |
          echo "Cooling down for 5 minutes..."
          sleep 300

      - name: Run thermal validation (governor OFF)
        id: thermal_off
        run: |
          MODEL="${{ github.event.inputs.model || 'mlx-community/Qwen3-0.6B-4bit' }}"
          PROMPT_TOKENS="${{ github.event.inputs.prompt_tokens || '24000' }}"
          ROUNDS="${{ github.event.inputs.rounds || '4' }}"
          echo "Running thermal validation (governor OFF) with model: $MODEL, prompt_tokens: $PROMPT_TOKENS, rounds: $ROUNDS"
          mkdir -p bench/results
          python bench/thermal_validation.py \
            --model "$MODEL" \
            --prompt-tokens "$PROMPT_TOKENS" \
            --rounds "$ROUNDS" \
            --governor off \
            --out bench/results/thermal_off.json
        timeout-minutes: 60

      - name: Run regression gate
        id: regression
        run: |
          echo "Running regression gate on benchmark artifacts..."
          if [ -f bench/results/thermal_on.json ] && [ -f bench/results/thermal_off.json ]; then
            echo "Running regression: baseline=thermal_on.json candidate=thermal_off.json"
            python bench/regression.py \
              --baseline bench/results/thermal_on.json \
              --candidate bench/results/thermal_off.json \
              --threshold 0.10
          else
            echo "Skipping regression gate - missing benchmark artifacts"
            exit 0
          fi
        timeout-minutes: 10

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: bench/results/
          retention-days: 30

      - name: Create benchmark summary
        if: always()
        run: |
          echo "## Benchmark Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Governor ON | Governor OFF |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------------|--------------|" >> $GITHUB_STEP_SUMMARY
          
          if [ -f bench/results/thermal_on.json ]; then
            ON_TIME=$(python -c "import json; print(json.load(open('bench/results/thermal_on.json'))['rounds'][0]['wall_time'])")
            ON_TPS=$(python -c "import json; print(json.load(open('bench/results/thermal_on.json'))['rounds'][0]['prefill_tps'])")
            echo "| Wall Time (round 1) | ${ON_TIME}s | - |" >> $GITHUB_STEP_SUMMARY
            echo "| Prefill Tok/s (round 1) | ${ON_TPS} | - |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f bench/results/thermal_off.json ]; then
            OFF_TIME=$(python -c "import json; print(json.load(open('bench/results/thermal_off.json'))['rounds'][0]['wall_time'])")
            OFF_TPS=$(python -c "import json; print(json.load(open('bench/results/thermal_off.json'))['rounds'][0]['prefill_tps'])")
            echo "| Wall Time (round 1) | - | ${OFF_TIME}s |" >> $GITHUB_STEP_SUMMARY
            echo "| Prefill Tok/s (round 1) | - | ${OFF_TPS} |" >> $GITHUB_STEP_SUMMARY
          fi