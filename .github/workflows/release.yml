name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build and publish (macos-14)
    runs-on: macos-14
    timeout-minutes: 30
    # Job-scoped so build provenance can mint an OIDC token and write an
    # attestation, on top of the release upload's contents/packages writes.
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    outputs:
      # Empty when the standalone binary didn't build; the homebrew job is
      # gated on this so it no-ops rather than publishing a bad formula.
      binary_sha256: ${{ steps.sha.outputs.sha256 }}
    steps:
      # Actions pinned to commit SHAs: mutable tags are a supply-chain risk.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - run: uv sync --extra dev --locked
      - run: uv run ruff check .
      - run: uv run --extra dev pytest -q --timeout=120

      # The wheel + sdist are the primary, verified install path
      # (uv tool install / pipx). These always build and gate the release.
      - name: Build wheel and sdist
        run: uv build

      # Signed SLSA build provenance for the wheel + sdist. Best-effort: repo or
      # org settings may not permit attestations yet, so never block a release
      # on it — warn and continue.
      - name: Attest build provenance
        id: attest
        continue-on-error: true
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
      - name: Warn if attestation failed
        if: steps.attest.outcome == 'failure'
        run: echo "::warning::build provenance attestation failed — repo/org settings may not allow attestations yet"

      # Standalone PyInstaller binary is best-effort: MLX ships @rpath-linked
      # native libs (libmlx/libjaccl) that don't survive PyInstaller's
      # flattening without dedicated rpath rewriting. Don't let a broken
      # binary block a release whose wheel install works.
      - name: Build standalone binary (best-effort)
        id: pyinstaller
        continue-on-error: true
        run: |
          uv pip install pyinstaller
          uv run pyinstaller --clean --noconfirm packaging/pyinstaller/daedalus.spec
          ./dist/daedalus --help
          echo "built=true" >> "$GITHUB_OUTPUT"

      - name: Compute binary SHA256
        id: sha
        if: steps.pyinstaller.outputs.built == 'true'
        run: echo "sha256=$(shasum -a 256 dist/daedalus | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Release integrity artifacts
        run: |
          cd dist
          shasum -a 256 *.whl *.tar.gz $( [ -f daedalus ] && echo daedalus ) > SHA256SUMS
          cd ..
          uv export --locked --no-dev --format requirements-txt > dist/requirements.lock.txt

      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/requirements.lock.txt
            dist/daedalus
          fail_on_unmatched_files: false
          body: |
            Install: `uv tool install daedalus-${{ github.ref_name }}-py3-none-any.whl`
            (or `pipx install` the wheel). Requires an Apple Silicon Mac with MLX.

            Artifacts verified in CI: ruff, full test suite, wheel/sdist build.
            The standalone binary is best-effort and may be absent.

  homebrew:
    name: Update Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only when this is the canonical repo AND a standalone binary was
    # actually produced (otherwise there is nothing for the formula to point at).
    if: github.repository == 'therahul-yo/Daedalus' && needs.build.outputs.binary_sha256 != ''
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Update Homebrew formula
        uses: mislav/bump-homebrew-formula-action@ecd3ec7bf4fa4ecbdaa0c379850187374d076eaa # v3.3
        with:
          formula-name: daedalus
          formula-file: Formula/daedalus.rb
          download-url: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/daedalus
          sha256: ${{ needs.build.outputs.binary_sha256 }}
        env:
          COMMITTER_TOKEN: ${{ secrets.GITHUB_TOKEN }}
