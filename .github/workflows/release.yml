name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --extra dev --locked
      - run: uv run --extra dev pytest -q
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: daedalus-dist
          path: dist/*
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

      # Add APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_ID,
      # APPLE_TEAM_ID, and APPLE_APP_PASSWORD before extending this job with
      # codesign/notarytool for a signed app bundle or installer.
