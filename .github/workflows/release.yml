name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build binary (macos-14)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      # Actions pinned to commit SHAs: mutable tags are a supply-chain risk.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - run: uv sync --extra dev --locked
      - name: Install PyInstaller
        run: uv pip install pyinstaller
      - name: Build with PyInstaller
        run: |
          uv run pyinstaller --clean --noconfirm packaging/pyinstaller/daedalus.spec
          ls -la dist/daedalus
      - name: Verify binary
        run: |
          ./dist/daedalus --help
      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 dist/daedalus | cut -d' ' -f1)
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
      - name: Upload binary to release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef0ae4f8 # v2
        with:
          files: dist/daedalus
          body: |
            Binary built from ${{ github.sha }}

            SHA256: ${{ steps.sha.outputs.sha256 }}

  homebrew:
    name: Update Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.repository == 'therahul-yo/daedalus'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Update Homebrew formula
        uses: mislav/bump-homebrew-formula-action@8b7d3b8e8a2d2a6f5d8c2e7b4f1a9c3d5e6f7a8b # pinned SHA
        with:
          formula-name: daedalus
          formula-file: Formula/daedalus.rb
          download-url: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/daedalus
          sha256: ${{ needs.build.outputs.sha256 }}
        env:
          COMMITTER_TOKEN: ${{ secrets.GITHUB_TOKEN }}