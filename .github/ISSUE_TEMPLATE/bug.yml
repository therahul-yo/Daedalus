name: Bug report
description: Something in Daedalus behaves incorrectly or crashes.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please fill in the details below — the version,
        hardware, exact command, and logs are what let us reproduce quickly.
  - type: input
    id: version
    attributes:
      label: Daedalus version
      description: Output of `daedalus --version` (or the git commit if running from source).
      placeholder: "0.2.0"
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: macOS and hardware
      description: macOS version plus the Mac model / chip and RAM.
      placeholder: "macOS 15.5, MacBook Air M4, 16 GB"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command line
      description: The exact `daedalus ...` invocation (redact any API key).
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected vs. what happened
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant server output / traceback. Paste as text, not a screenshot.
      render: shell
    validations:
      required: false
